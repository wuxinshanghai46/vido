<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIDO - 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">V</div>
      <span class="logo-text">VIDO</span>
    </div>

    <div class="login-tabs">
      <div class="login-tab active" onclick="switchTab('login')">登录</div>
      <div class="login-tab" onclick="switchTab('register')">注册</div>
    </div>

    <div id="login-error" class="login-error"></div>

    <!-- 登录表单 -->
    <form id="form-login" onsubmit="handleLogin(event)">
      <div class="login-field">
        <label>用户名</label>
        <input type="text" id="login-username" placeholder="请输入用户名" autocomplete="username" required />
      </div>
      <div class="login-field">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password" required />
      </div>
      <button type="submit" class="login-btn" id="btn-login">登录</button>
    </form>

    <!-- 注册表单 -->
    <form id="form-register" style="display:none" onsubmit="handleRegister(event)">
      <div class="login-field">
        <label>用户名</label>
        <input type="text" id="reg-username" placeholder="3-20位字母数字下划线" autocomplete="username" required />
      </div>
      <div class="login-field">
        <label>邮箱 <span style="opacity:.4">(选填)</span></label>
        <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="login-field">
        <label>密码</label>
        <input type="password" id="reg-password" placeholder="至少 6 位" autocomplete="new-password" required />
      </div>
      <div class="login-field">
        <label>确认密码</label>
        <input type="password" id="reg-password2" placeholder="再次输入密码" autocomplete="new-password" required />
      </div>
      <button type="submit" class="login-btn" id="btn-register">注册</button>
    </form>

    <div class="login-footer">VIDO AI 视频创作平台</div>
  </div>
</div>

<script>
// 已登录则跳转
if (sessionStorage.getItem('vido_token')) window.location.href = '/';

function switchTab(tab) {
  document.querySelectorAll('.login-tab').forEach((el, i) => el.classList.toggle('active', (tab === 'login' ? i === 0 : i === 1)));
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  hideError();
}

function showError(msg) { const el = document.getElementById('login-error'); el.textContent = msg; el.classList.add('show'); }
function hideError() { document.getElementById('login-error').classList.remove('show'); }

async function handleLogin(e) {
  e.preventDefault(); hideError();
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) return showError('请填写用户名和密码');
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = '登录中...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }), credentials: 'include'
    });
    const data = await res.json();
    if (!data.success) { showError(data.error); return; }
    sessionStorage.setItem('vido_token', data.data.access_token);
    // admin 跳转后台，其他跳前台
    window.location.href = data.data.user.role === 'admin' ? '/admin.html' : '/';
  } catch (err) { showError('网络错误: ' + err.message); }
  finally { btn.disabled = false; btn.textContent = '登录'; }
}

async function handleRegister(e) {
  e.preventDefault(); hideError();
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;
  if (!username || !password) return showError('请填写用户名和密码');
  if (password !== password2) return showError('两次密码不一致');
  const btn = document.getElementById('btn-register');
  btn.disabled = true; btn.textContent = '注册中...';
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password }), credentials: 'include'
    });
    const data = await res.json();
    if (!data.success) { showError(data.error); return; }
    sessionStorage.setItem('vido_token', data.data.access_token);
    window.location.href = '/';
  } catch (err) { showError('网络错误: ' + err.message); }
  finally { btn.disabled = false; btn.textContent = '注册'; }
}
</script>
</body>
</html>
