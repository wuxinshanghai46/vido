<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIDO 编辑器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/editor.css" />
</head>
<body style="background:#0D0E12;color:#FBFBFB;font-family:'Inter',-apple-system,sans-serif;margin:0;overflow:hidden">
  <div id="app" style="display:flex;flex-direction:column;height:100vh">
    <!-- 顶栏 -->
    <header class="ed-header">
      <div class="ed-header-left">
        <a href="/" class="ed-logo">
          <div class="ed-logo-icon">V</div>
          <span class="ed-logo-text">VIDO</span>
        </a>
        <span class="ed-sep">/</span>
        <span class="ed-proj-name" id="editor-project-title">编辑器</span>
      </div>
      <div class="ed-header-right">
        <span id="save-status" class="save-status"></span>
        <button class="ed-btn-render" id="btn-render" onclick="startRender()">渲染导出</button>
      </div>
    </header>

    <!-- 主体 -->
    <div class="ed-main">
      <!-- 左：预览 + 右属性面板 -->
      <div class="ed-workspace">
        <!-- 视频预览区 -->
        <div class="ed-preview">
          <div class="ed-player-wrap">
            <video id="preview-video" class="ed-player" preload="metadata" playsinline>
              <source id="preview-video-src" src="" type="video/mp4" />
            </video>
            <div class="ed-player-overlay" id="player-overlay" onclick="togglePlay()">
              <div class="ed-play-btn" id="play-btn-icon">▶</div>
            </div>
          </div>
          <div class="ed-player-controls">
            <button class="ed-ctrl-btn" onclick="togglePlay()" id="ctrl-play">▶</button>
            <span class="ed-time" id="player-time">0:00 / 0:00</span>
            <div class="ed-progress-bar" id="progress-bar" onclick="seekTo(event)">
              <div class="ed-progress-fill" id="progress-fill"></div>
            </div>
          </div>
        </div>

        <!-- 右侧属性面板 -->
        <div class="ed-props" id="ed-props">
          <div class="ed-props-empty" id="props-empty">
            <div style="opacity:.3;font-size:18px;margin-bottom:6px">✂</div>
            <div style="font-size:12px;color:rgba(251,251,251,.4)">点击时间轴上的片段进行编辑</div>
          </div>

          <!-- 右侧 Tab 切换 -->
          <div class="ed-rtabs">
            <button class="ed-rtab active" onclick="switchRightTab('clip',this)">片段</button>
            <button class="ed-rtab" onclick="switchRightTab('subtitle',this)">字幕</button>
            <button class="ed-rtab" onclick="switchRightTab('audio',this)">音频</button>
            <button class="ed-rtab" onclick="switchRightTab('voice',this)">配音</button>
          </div>

          <!-- Tab: 片段属性 -->
          <div class="ed-rtab-panel" id="rtab-clip">
            <div id="scene-panel" style="display:none">
              <div class="ed-panel-head">
                <span id="scene-panel-title">场景属性</span>
                <button class="ed-icon-btn danger" id="btn-delete-scene" onclick="deleteSelectedScene()">删除</button>
              </div>
              <div class="ed-form-group">
                <label>裁剪起点（秒）</label>
                <input type="number" id="trim-start" min="0" step="0.5" value="0" placeholder="0" oninput="saveTrim()" />
              </div>
              <div class="ed-form-group">
                <label>裁剪终点（秒）<span class="ed-hint" id="clip-duration-hint"></span></label>
                <input type="number" id="trim-end" min="0" step="0.5" placeholder="留空=不截断" oninput="saveTrim()" />
              </div>
            </div>
          </div>

          <!-- Tab: 字幕 -->
          <div class="ed-rtab-panel" id="rtab-subtitle" style="display:none">
            <div class="ed-panel-head"><span>字幕配置</span></div>
            <div class="ed-form-group">
              <label>字幕文字（当前场景）</label>
              <textarea id="dialogue-text" rows="4" placeholder="输入要显示的字幕..." oninput="saveDialogue()"></textarea>
            </div>
            <div class="ed-form-row">
              <div class="ed-form-group">
                <label>出现时间（秒）</label>
                <input type="number" id="dialogue-start" min="0" step="0.5" value="0" oninput="saveDialogue()" />
              </div>
              <div class="ed-form-group">
                <label>持续时长（秒）</label>
                <input type="number" id="dialogue-duration" min="1" step="1" value="5" oninput="saveDialogue()" />
              </div>
            </div>
            <div class="ed-form-row">
              <div class="ed-form-group">
                <label>位置</label>
                <select id="dialogue-position" onchange="saveDialogue()">
                  <option value="bottom">底部</option>
                  <option value="center">居中</option>
                  <option value="top">顶部</option>
                </select>
              </div>
              <div class="ed-form-group">
                <label>字号</label>
                <select id="dialogue-fontsize" onchange="saveDialogue()">
                  <option value="20">小</option>
                  <option value="28" selected>中</option>
                  <option value="36">大</option>
                  <option value="48">超大</option>
                </select>
              </div>
            </div>
            <div class="ed-form-group">
              <label>颜色</label>
              <div class="ed-color-row">
                <button class="ed-color-opt active" data-color="white" onclick="pickSubtitleColor(this,'white')" style="background:#fff"></button>
                <button class="ed-color-opt" data-color="yellow" onclick="pickSubtitleColor(this,'yellow')" style="background:#FFF600"></button>
                <button class="ed-color-opt" data-color="#21FFF3" onclick="pickSubtitleColor(this,'#21FFF3')" style="background:#21FFF3"></button>
                <button class="ed-color-opt" data-color="black" onclick="pickSubtitleColor(this,'black')" style="background:#333;border:1px solid #666"></button>
              </div>
            </div>
          </div>

          <!-- Tab: 音频/音乐 -->
          <div class="ed-rtab-panel" id="rtab-audio" style="display:none">
            <div class="ed-panel-head"><span>背景音乐</span></div>
            <div id="music-panel">
              <div id="music-empty" class="ed-music-empty">
                <label class="ed-upload-btn" for="music-upload">
                  <input type="file" id="music-upload" accept="audio/*" onchange="uploadMusic(this)" style="display:none" />
                  + 导入音乐（MP3/WAV/FLAC）
                </label>
              </div>
              <div id="music-loaded" style="display:none">
                <div class="ed-music-info">
                  <span>♫</span>
                  <span id="music-name" class="ed-music-name"></span>
                  <button class="ed-icon-btn" onclick="removeMusic()">✕</button>
                </div>
                <div class="ed-music-timeline" id="music-timeline">
                  <canvas id="music-waveform" width="220" height="40"></canvas>
                  <div class="music-trim-region" id="music-trim-region">
                    <div class="music-trim-handle left" id="trim-handle-left"></div>
                    <div class="music-trim-handle right" id="trim-handle-right"></div>
                  </div>
                  <div class="music-playhead" id="music-playhead"></div>
                </div>
                <div class="ed-music-meta">
                  <span id="music-trim-range">0:00 - 0:00</span>
                  <button class="ed-mini-btn" id="music-preview-btn" onclick="toggleMusicPreview()">▶ 试听</button>
                </div>
                <div class="ed-form-group" style="margin-top:8px">
                  <label>音量 <span id="volume-val">50%</span></label>
                  <input type="range" id="music-volume" min="0" max="100" value="50"
                    oninput="document.getElementById('volume-val').textContent=this.value+'%'; scheduleSave()" />
                </div>
                <div class="ed-form-group">
                  <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="music-loop" checked onchange="scheduleSave()" /> 循环播放
                  </label>
                </div>
              </div>
            </div>
          </div>

          <!-- Tab: 配音/TTS -->
          <div class="ed-rtab-panel" id="rtab-voice" style="display:none">
            <div class="ed-panel-head"><span>语音配音</span></div>
            <div class="ed-form-group">
              <label>当前场景配音文本</label>
              <textarea id="voice-text" rows="4" placeholder="输入需要配音的文字..." oninput="saveVoiceover()"></textarea>
            </div>
            <div class="ed-form-group">
              <label>音色</label>
              <select id="voice-id" onchange="saveVoiceover()">
                <option value="">默认</option>
              </select>
            </div>
            <div class="ed-form-row">
              <div class="ed-form-group">
                <label>语速</label>
                <input type="range" id="voice-speed" min="0.5" max="2" step="0.1" value="1.0"
                  oninput="document.getElementById('voice-speed-val').textContent=parseFloat(this.value).toFixed(1)+'x'; saveVoiceover()" />
              </div>
              <span class="ed-form-val" id="voice-speed-val">1.0x</span>
            </div>
            <div class="ed-form-group">
              <label>音量 <span id="voice-volume-val">80%</span></label>
              <input type="range" id="voice-volume" min="0" max="100" value="80"
                oninput="document.getElementById('voice-volume-val').textContent=this.value+'%'; saveVoiceover()" />
            </div>
            <button class="ed-btn-render" style="width:100%;margin-top:8px" id="btn-gen-voice" onclick="generateVoiceover()">生成配音</button>
            <div id="voice-status" style="font-size:11px;color:var(--text3);margin-top:6px"></div>
          </div>

          <!-- 渲染进度 -->
          <div id="render-panel" style="display:none;margin-top:12px">
            <div class="ed-panel-head"><span>渲染进度</span></div>
            <div id="render-log" class="ed-render-log"></div>
            <div id="render-result" style="display:none;margin-top:8px">
              <button class="ed-btn-render" style="width:100%" onclick="previewRender()">▶ 预览成品</button>
              <a id="render-download" class="ed-btn-dl" href="#">⬇ 下载成品</a>
            </div>
          </div>
        </div>
      </div>

      <!-- 操作工具栏 -->
      <div class="ed-toolbar">
        <div class="ed-tb-left">
          <button class="ed-tb-btn" id="tb-play" onclick="togglePlay()" title="播放/暂停">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><polygon points="3,1 12,7 3,13"/></svg>
          </button>
          <button class="ed-tb-btn" onclick="prevClip()" title="上一个片段">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="1" y="2" width="2" height="10"/><polygon points="12,2 5,7 12,12"/></svg>
          </button>
          <button class="ed-tb-btn" onclick="nextClip()" title="下一个片段">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="11" y="2" width="2" height="10"/><polygon points="2,2 9,7 2,12"/></svg>
          </button>
          <span class="ed-tb-time" id="tb-current-time">0:00</span>
          <span class="ed-tb-sep">/</span>
          <span class="ed-tb-time ed-tb-total" id="tb-total-time">0:00</span>
        </div>
        <div class="ed-tb-center">
          <button class="ed-tb-btn" onclick="splitClipAtPlayhead()" title="在播放位置分割">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="7" y1="1" x2="7" y2="13"/><polyline points="4,4 7,1 10,4"/><polyline points="4,10 7,13 10,10"/></svg>
            分割
          </button>
          <button class="ed-tb-btn" onclick="deleteSelectedScene()" title="删除选中片段">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><polyline points="2,4 12,4"/><path d="M5,4V2.5A.5.5,0,0,1,5.5,2h3a.5.5,0,0,1,.5.5V4"/><path d="M3,4v8.5a.5.5,0,0,0,.5.5h7a.5.5,0,0,0,.5-.5V4"/></svg>
            删除
          </button>
          <button class="ed-tb-btn" onclick="undoAction()" title="撤销">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M4,5H10a3,3,0,0,1,0,6H8"/><polyline points="6,3 4,5 6,7"/></svg>
            撤销
          </button>
        </div>
        <div class="ed-tb-right">
          <button class="ed-tb-btn" onclick="zoomTimeline(-1)" title="缩小">−</button>
          <span class="ed-tb-zoom" id="tb-zoom-level">100%</span>
          <button class="ed-tb-btn" onclick="zoomTimeline(1)" title="放大">+</button>
        </div>
      </div>

      <!-- 底部时间轴 -->
      <div class="ed-timeline-area" id="timeline-area">
        <!-- 标尺 + 播放头 -->
        <div class="ed-tl-ruler" id="tl-ruler">
          <div class="ed-tl-playhead" id="tl-playhead" onmousedown="startPlayheadDrag(event)">
            <div class="ed-tl-playhead-head"></div>
            <div class="ed-tl-playhead-line"></div>
          </div>
        </div>
        <!-- 轨道区域 -->
        <div class="ed-tl-tracks-wrap" id="tl-tracks-wrap">
          <!-- 播放头竖线（贯穿所有轨道） -->
          <div class="ed-tl-playhead-ext" id="tl-playhead-ext"></div>
          <!-- 视频轨 -->
          <div class="ed-tl-lane">
            <div class="ed-tl-lane-label">V</div>
            <div class="ed-tl-track" id="timeline"></div>
          </div>
          <!-- 原始音频轨（从视频片段中分离） -->
          <div class="ed-tl-lane ed-tl-lane-audio">
            <div class="ed-tl-lane-label">A</div>
            <div class="ed-tl-track ed-tl-audio-track" id="audio-track"></div>
          </div>
          <!-- 背景音乐轨 -->
          <div class="ed-tl-lane ed-tl-lane-music">
            <div class="ed-tl-lane-label">M</div>
            <div class="ed-tl-track ed-tl-music-track" id="music-track"></div>
          </div>
          <!-- 配音轨 -->
          <div class="ed-tl-lane ed-tl-lane-voice">
            <div class="ed-tl-lane-label">VO</div>
            <div class="ed-tl-track ed-tl-voice-track" id="voice-track"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 视频预览弹窗 -->
  <div id="video-modal" class="modal" onclick="if(event.target.id==='video-modal')closePreviewModal()">
    <div class="modal-box">
      <div class="modal-header">
        <span id="modal-title">预览</span>
        <button class="modal-close" onclick="closePreviewModal()">✕</button>
      </div>
      <div class="modal-body">
        <video id="modal-video" controls autoplay playsinline>
          <source id="modal-video-src" src="" type="video/mp4" />
        </video>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/editor.js"></script>
</body>
</html>
