<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <radialGradient id="purpleglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8000c0" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#040008" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="120" height="160" fill="#030006"/>
  <rect width="120" height="160" fill="url(#purpleglow)"/>
  <!-- Dark castle -->
  <rect x="35" y="55" width="50" height="105" fill="#0a0012"/>
  <rect x="40" y="40" width="12" height="25" fill="#0a0012"/>
  <rect x="68" y="40" width="12" height="25" fill="#0a0012"/>
  <!-- Battlements -->
  <rect x="35" y="50" width="6" height="10" fill="#0a0012"/>
  <rect x="44" y="50" width="6" height="10" fill="#0a0012"/>
  <rect x="53" y="50" width="6" height="10" fill="#0a0012"/>
  <rect x="62" y="50" width="6" height="10" fill="#0a0012"/>
  <rect x="71" y="50" width="6" height="10" fill="#0a0012"/>
  <rect x="79" y="50" width="6" height="10" fill="#0a0012"/>
  <!-- Castle windows -->
  <rect x="45" y="65" width="8" height="10" rx="4" fill="#6000a0" opacity=".7"/>
  <rect x="67" y="65" width="8" height="10" rx="4" fill="#6000a0" opacity=".7"/>
  <rect x="56" y="78" width="8" height="12" rx="4" fill="#8000c0" opacity=".5"/>
