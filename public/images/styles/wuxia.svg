<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="bgwx" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040810"/>
      <stop offset="50%" stop-color="#0a1a30"/>
      <stop offset="100%" stop-color="#102040"/>
    </linearGradient>
  </defs>
  <rect width="120" height="160" fill="url(#bgwx)"/>
  <!-- Misty mountains ink wash -->
  <ellipse cx="20" cy="120" rx="30" ry="50" fill="#0d1828" opacity=".8"/>
  <ellipse cx="55" cy="100" rx="35" ry="60" fill="#0a1520" opacity=".9"/>
  <ellipse cx="95" cy="115" rx="30" ry="50" fill="#0d1828" opacity=".8"/>
  <ellipse cx="40" cy="90" rx="25" ry="45" fill="#08101e" opacity=".85"/>
  <ellipse cx="80" cy="85" rx="30" ry="55" fill="#06101c" opacity=".9"/>
  <!-- Mist layers -->
  <rect x="0" y="100" width="120" height="15" fill="rgba(200,220,255,0.04)"/>
  <rect x="0" y="115" width="120" height="10" fill="rgba(200,220,255,0.05)"/>
  <!-- Moon -->
  <circle cx="85" cy="25" r="15" fill="#fff8e0" opacity=".2"/>
  <circle cx="85" cy="25" r="12" fill="#fff8e0" opacity=".15"/>
  <circle cx="88" cy="22" r="10" fill="#040810"/>
  <!-- Cherry blossom tree on cliff -->
  <line x1="25" y1="160" x2="25" y2="65" stroke="#1a0808" stroke-width="2.5"/>
  <line x1="25" y1="75" x2="10" y2="60" stroke="#1a0808" stroke-width="1.5"/>
  <line x1="25" y1="80" x2="40" y2="65" stroke="#1a0808" stroke-width="1.5"/>
  <circle cx="10" cy="57" r="8" fill="#3a0a1a" opacity=".8"/>
  <circle cx="18" cy="52" r="8" fill="#3a0a1a" opacity=".8"/>
  <circle cx="30" cy="55" r="10" fill="#4a0a1a" opacity=".8"/>
  <circle cx="40" cy="60" r="8" fill="#3a0a1a" opacity=".8"/>
  <!-- Blossom dots -->
  <circle cx="8" cy="55" r="2" fill="#ff9090" opacity=".6"/>
  <circle cx="16" cy="50" r="2" fill="#ffb0b0" opacity=".7"/>
  <circle cx="28" cy="52" r="2.5" fill="#ff9090" opacity=".6"/>
  <circle cx="38" cy="58" r="2" fill="#ffb0b0" opacity=".5"/>
  <circle cx="22" cy="48" r="2" fill="#ff8080" opacity=".7"/>
  <!-- Falling petals -->
  <ellipse cx="55" cy="70" rx="2" ry="1.5" fill="#ffb0c0" opacity=".5" transform="rotate(20 55 70)"/>
  <ellipse cx="75" cy="85" rx="2" ry="1.5" fill="#ffb0c0" opacity=".4" transform="rotate(-30 75 85)"/>
  <ellipse cx="100" cy="60" rx="2" ry="1.5" fill="#ffb0c0" opacity=".5" transform="rotate(10 100 60)"/>
  <!-- Swordsman silhouette -->
  <circle cx="72" cy="72" r="6" fill="#0a1020"/><!-- head -->
  <rect x="69" y="78" width="6" height="14" fill="#0a1020"/><!-- body -->
  <!-- Flowing robe -->
  <polygon points="65,82 72,100 79,82 72,88" fill="#0a1020"/>
  <!-- Sword raised -->
  <line x1="75" y1="75" x2="90" y2="55" stroke="#c4a020" stroke-width="1.5"/>
  <line x1="90" y1="55" x2="93" y2="50" stroke="#c4a020" stroke-width="2.5"/>
  <!-- Sword glow -->
  <line x1="90" y1="55" x2="93" y2="50" stroke="#ffe060" stroke-width="1" opacity=".6"/>
  <!-- Gold inscription -->
  <text x="95" y="120" font-size="10" fill="#c4a020" opacity=".6" font-family="serif">剑</text>
  <text x="95" y="135" font-size="10" fill="#c4a020" opacity=".5" font-family="serif">道</text>
</svg>
