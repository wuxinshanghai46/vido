<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="bggb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5a"/>
      <stop offset="40%" stop-color="#3a7a90"/>
      <stop offset="70%" stop-color="#5aaa40"/>
      <stop offset="100%" stop-color="#2a5a20"/>
    </linearGradient>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5a"/>
      <stop offset="100%" stop-color="#4a9ab0"/>
    </linearGradient>
  </defs>
  <rect width="120" height="160" fill="url(#bggb)"/>
  <!-- Sky -->
  <rect width="120" height="90" fill="url(#sky2)"/>
  <!-- Clouds -->
  <ellipse cx="30" cy="35" rx="22" ry="10" fill="white" opacity=".8"/>
  <ellipse cx="20" cy="38" rx="14" ry="8" fill="white" opacity=".7"/>
  <ellipse cx="40" cy="38" rx="14" ry="8" fill="white" opacity=".7"/>
  <ellipse cx="85" cy="25" rx="18" ry="8" fill="white" opacity=".75"/>
  <ellipse cx="75" cy="28" rx="12" ry="7" fill="white" opacity=".7"/>
  <ellipse cx="95" cy="28" rx="12" ry="7" fill="white" opacity=".7"/>
  <!-- Rolling hills -->
  <ellipse cx="30" cy="100" rx="50" ry="30" fill="#4a9040"/>
  <ellipse cx="90" cy="105" rx="50" ry="28" fill="#3a8030"/>
  <ellipse cx="60" cy="115" rx="70" ry="25" fill="#5aaa40"/>
  <!-- Tree -->
  <rect x="57" y="70" width="6" height="40" fill="#5a3010"/>
  <circle cx="60" cy="60" r="20" fill="#2a6020" opacity=".9"/>
  <circle cx="48" cy="68" r="15" fill="#3a7830" opacity=".85"/>
  <circle cx="72" cy="68" r="15" fill="#3a7830" opacity=".85"/>
  <circle cx="60" cy="75" r="12" fill="#4a9040" opacity=".8"/>
  <!-- Spirited away style building in bg -->
  <rect x="82" y="60" width="30" height="50" fill="#c08040" opacity=".5"/>
  <polygon points="82,60 97,45 112,60" fill="#8b3a10" opacity=".5"/>
  <rect x="88" y="70" width="8" height="12" fill="#5a2800" opacity=".5"/>
  <rect x="96" y="70" width="8" height="12" fill="#5a2800" opacity=".5"/>
  <!-- Ground -->
  <rect x="0" y="128" width="120" height="32" fill="#3a6820"/>
  <!-- Fireflies -->
  <circle cx="20" cy="110" r="1.5" fill="#ffffaa" opacity=".8"/>
  <circle cx="45" cy="105" r="1.5" fill="#ffffaa" opacity=".7"/>
  <circle cx="100" cy="100" r="1.5" fill="#ffffaa" opacity=".8"/>
  <circle cx="75" cy="115" r="1" fill="#ffffaa" opacity=".6"/>
</svg>
