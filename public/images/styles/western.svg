<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="bgwt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#03030a"/>
      <stop offset="50%" stop-color="#0a0a20"/>
      <stop offset="100%" stop-color="#181830"/>
    </linearGradient>
  </defs>
  <rect width="120" height="160" fill="url(#bgwt)"/>
  <!-- Epic landscape - dark mountain -->
  <polygon points="0,100 35,30 60,75 80,20 120,95 120,160 0,160" fill="#0a0a1a"/>
  <polygon points="0,120 25,60 50,90 70,45 100,80 120,110 120,160 0,160" fill="#050510"/>
  <!-- Volumetric light beam -->
  <polygon points="55,0 65,0 90,160 30,160" fill="rgba(200,200,255,0.03)"/>
  <!-- Epic sky light -->
  <ellipse cx="60" cy="0" rx="60" ry="40" fill="rgba(120,100,180,0.08)"/>
  <!-- Stars -->
  <circle cx="15" cy="15" r="1" fill="white" opacity=".7"/>
  <circle cx="35" cy="8" r="1.5" fill="white" opacity=".9"/>
  <circle cx="55" cy="12" r="1" fill="white" opacity=".6"/>
  <circle cx="75" cy="6" r="1.5" fill="white" opacity=".8"/>
  <circle cx="95" cy="18" r="1" fill="white" opacity=".7"/>
  <circle cx="108" cy="10" r="1" fill="white" opacity=".6"/>
  <!-- Moon/glowing orb -->
  <circle cx="25" cy="30" r="12" fill="#e8f0ff" opacity=".06"/>
  <circle cx="25" cy="30" r="8" fill="#e8f0ff" opacity=".08"/>
  <circle cx="25" cy="30" r="5" fill="#e8f0ff" opacity=".15"/>
  <!-- Silhouette hero -->
  <ellipse cx="60" cy="108" rx="8" ry="10" fill="#050510"/><!-- body -->
  <circle cx="60" cy="94" r="7" fill="#050510"/><!-- head -->
  <!-- Cape -->
  <polygon points="52,100 45,130 60,118 75,130 68,100" fill="#080818"/>
  <!-- Sword/weapon glow -->
  <line x1="72" y1="88" x2="88" y2="70" stroke="#8888ff" stroke-width="1.5" opacity=".5"/>
  <line x1="72" y1="88" x2="88" y2="70" stroke="white" stroke-width="0.5" opacity=".3"/>
  <!-- Dramatic ground fog -->
  <ellipse cx="60" cy="148" rx="55" ry="12" fill="#1a1a3a" opacity=".6"/>
  <ellipse cx="30" cy="152" rx="30" ry="8" fill="#101028" opacity=".5"/>
  <ellipse cx="90" cy="150" rx="30" ry="8" fill="#101028" opacity=".5"/>
  <!-- Epic particle effects -->
  <circle cx="45" cy="125" r="1.5" fill="#8080ff" opacity=".4"/>
  <circle cx="75" cy="120" r="1" fill="#8080ff" opacity=".5"/>
  <circle cx="90" cy="130" r="1.5" fill="#8080ff" opacity=".3"/>
</svg>
