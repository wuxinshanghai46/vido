<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="bgmc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="60%" stop-color="#041428"/>
      <stop offset="100%" stop-color="#062040"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0d8f0"/>
      <stop offset="40%" stop-color="#4080b0"/>
      <stop offset="100%" stop-color="#103060"/>
    </linearGradient>
  </defs>
  <rect width="120" height="160" fill="url(#bgmc)"/>
  <!-- Space/energy background grid -->
  <line x1="0" y1="40" x2="120" y2="40" stroke="#002040" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="120" y2="80" stroke="#002040" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="120" y2="120" stroke="#002040" stroke-width="0.5"/>
  <line x1="40" y1="0" x2="40" y2="160" stroke="#002040" stroke-width="0.5"/>
  <line x1="80" y1="0" x2="80" y2="160" stroke="#002040" stroke-width="0.5"/>
  <!-- Mecha robot -->
  <!-- Head -->
  <rect x="46" y="18" width="28" height="22" rx="4" fill="url(#metal)"/>
  <!-- Head visor -->
  <rect x="49" y="24" width="22" height="8" rx="2" fill="#00d4ff" opacity=".9"/>
  <rect x="50" y="25" width="8" height="6" rx="1" fill="#00a0ff" opacity=".8"/>
  <rect x="62" y="25" width="8" height="6" rx="1" fill="#00a0ff" opacity=".8"/>
  <!-- Head antennae -->
  <line x1="55" y1="18" x2="52" y2="10" stroke="#4080b0" stroke-width="2"/>
  <circle cx="52" cy="9" r="2" fill="#00d4ff" opacity=".9"/>
  <line x1="65" y1="18" x2="68" y2="10" stroke="#4080b0" stroke-width="2"/>
  <circle cx="68" cy="9" r="2" fill="#00d4ff" opacity=".9"/>
  <!-- Torso -->
  <rect x="38" y="40" width="44" height="40" rx="5" fill="url(#metal)"/>
  <!-- Chest core -->
  <circle cx="60" cy="60" r="12" fill="#001840"/>
  <circle cx="60" cy="60" r="8" fill="#00d4ff" opacity=".3"/>
  <circle cx="60" cy="60" r="5" fill="#00d4ff" opacity=".7"/>
  <circle cx="60" cy="60" r="2" fill="white"/>
  <!-- Torso details -->
  <rect x="40" y="44" width="8" height="4" rx="1" fill="#00a0c0" opacity=".6"/>
  <rect x="72" y="44" width="8" height="4" rx="1" fill="#00a0c0" opacity=".6"/>
  <line x1="42" y1="52" x2="78" y2="52" stroke="#003060" stroke-width="1"/>
  <!-- Shoulder plates -->
  <rect x="22" y="36" width="18" height="22" rx="4" fill="#5090c0"/>
  <rect x="80" y="36" width="18" height="22" rx="4" fill="#5090c0"/>
  <!-- Arms -->
  <rect x="24" y="58" width="14" height="28" rx="5" fill="url(#metal)"/>
  <rect x="82" y="58" width="14" height="28" rx="5" fill="url(#metal)"/>
  <!-- Hand/cannon -->
  <rect x="20" y="84" width="20" height="14" rx="3" fill="#3060a0"/>
  <circle cx="20" cy="91" r="5" fill="#1a3a6a"/>
  <line x1="15" y1="91" x2="8" y2="91" stroke="#00d4ff" stroke-width="2"/>
  <!-- Energy blast from cannon -->
  <ellipse cx="5" cy="91" rx="4" ry="3" fill="#00d4ff" opacity=".8"/>
  <ellipse cx="2" cy="91" rx="2" ry="1.5" fill="white" opacity=".9"/>
  <!-- Legs -->
  <rect x="44" y="80" width="14" height="38" rx="4" fill="url(#metal)"/>
  <rect x="62" y="80" width="14" height="38" rx="4" fill="url(#metal)"/>
  <!-- Feet -->
  <rect x="40" y="115" width="22" height="10" rx="3" fill="#3060a0"/>
  <rect x="58" y="115" width="22" height="10" rx="3" fill="#3060a0"/>
  <!-- Ground energy -->
  <line x1="0" y1="145" x2="120" y2="145" stroke="#00d4ff" stroke-width="1.5" opacity=".4"/>
  <ellipse cx="60" cy="148" rx="40" ry="5" fill="#00d4ff" opacity=".08"/>
</svg>
