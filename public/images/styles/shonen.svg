<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="bgsh2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="40%" stop-color="#4a0010"/>
      <stop offset="70%" stop-color="#c00020"/>
      <stop offset="100%" stop-color="#ff6000"/>
    </linearGradient>
  </defs>
  <rect width="120" height="160" fill="url(#bgsh2)"/>
  <!-- Speed lines from center -->
  <line x1="60" y1="80" x2="0" y2="0" stroke="rgba(255,200,0,.2)" stroke-width="1.5"/>
  <line x1="60" y1="80" x2="30" y2="0" stroke="rgba(255,200,0,.2)" stroke-width="1.5"/>
  <line x1="60" y1="80" x2="60" y2="0" stroke="rgba(255,200,0,.25)" stroke-width="2"/>
  <line x1="60" y1="80" x2="90" y2="0" stroke="rgba(255,200,0,.2)" stroke-width="1.5"/>
  <line x1="60" y1="80" x2="120" y2="0" stroke="rgba(255,200,0,.2)" stroke-width="1.5"/>
  <line x1="60" y1="80" x2="120" y2="40" stroke="rgba(255,200,0,.15)" stroke-width="1"/>
  <line x1="60" y1="80" x2="120" y2="80" stroke="rgba(255,200,0,.15)" stroke-width="1"/>
  <line x1="60" y1="80" x2="120" y2="120" stroke="rgba(255,200,0,.15)" stroke-width="1"/>
  <line x1="60" y1="80" x2="120" y2="160" stroke="rgba(255,200,0,.15)" stroke-width="1"/>
  <line x1="60" y1="80" x2="90" y2="160" stroke="rgba(255,200,0,.15)" stroke-width="1"/>
  <line x1="60" y1="80" x2="60" y2="160" stroke="rgba(255,200,0,.15)" stroke-width="1"/>
  <line x1="60" y1="80" x2="30" y2="160" stroke="rgba(255,200,0,.15)" stroke-width="1"/>
  <line x1="60" y1="80" x2="0" y2="160" stroke="rgba(255,200,0,.15)" stroke-width="1"/>
  <line x1="60" y1="80" x2="0" y2="120" stroke="rgba(255,200,0,.15)" stroke-width="1"/>
  <line x1="60" y1="80" x2="0" y2="80" stroke="rgba(255,200,0,.15)" stroke-width="1"/>
  <line x1="60" y1="80" x2="0" y2="40" stroke="rgba(255,200,0,.15)" stroke-width="1"/>
  <!-- Explosion/impact -->
  <circle cx="60" cy="80" r="25" fill="rgba(255,200,0,.15)"/>
  <circle cx="60" cy="80" r="15" fill="rgba(255,100,0,.2)"/>
  <!-- Spiky hair character -->
  <!-- Hair spikes -->
  <polygon points="60,20 52,40 60,35" fill="#1a0800"/>
  <polygon points="60,20 68,40 60,35" fill="#1a0800"/>
  <polygon points="60,20 45,38 55,38" fill="#1a0800"/>
  <polygon points="60,20 75,38 65,38" fill="#1a0800"/>
  <polygon points="60,20 38,42 50,42" fill="#1a0800"/>
  <polygon points="60,20 82,42 70,42" fill="#1a0800"/>
  <!-- Face -->
  <ellipse cx="60" cy="48" rx="15" ry="17" fill="#f0d0a0"/>
  <!-- Determined eyes - narrow -->
  <rect x="47" y="44" width="10" height="4" rx="2" fill="#1a0800"/>
  <rect x="63" y="44" width="10" height="4" rx="2" fill="#1a0800"/>
  <rect x="50" y="44" width="4" height="4" rx="1" fill="#ff4000"/>
  <rect x="66" y="44" width="4" height="4" rx="1" fill="#ff4000"/>
  <!-- Battle scar -->
  <line x1="65" y1="40" x2="68" y2="50" stroke="#c06040" stroke-width="1"/>
  <!-- Mouth - battle cry -->
  <path d="M50 57 Q60 64 70 57" fill="#c02000" stroke="none"/>
  <!-- Battle aura -->
  <ellipse cx="60" cy="90" rx="30" ry="40" fill="rgba(255,80,0,.1)"/>
  <!-- Impact marks -->
  <text x="15" y="30" font-size="14" fill="#ffe000" opacity=".7" font-weight="bold">⚡</text>
  <text x="88" y="45" font-size="12" fill="#ff8000" opacity=".8" font-weight="bold">💥</text>
