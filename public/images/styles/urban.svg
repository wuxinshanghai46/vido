<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050010"/>
      <stop offset="100%" stop-color="#180838"/>
    </linearGradient>
  </defs>
  <rect width="120" height="160" fill="url(#sky)"/>
  <!-- City buildings silhouette -->
  <rect x="0" y="80" width="20" height="80" fill="#0a0520"/>
  <rect x="5" y="65" width="12" height="20" fill="#0a0520"/>
  <rect x="18" y="70" width="25" height="90" fill="#0d0728"/>
  <rect x="22" y="55" width="15" height="20" fill="#0d0728"/>
  <rect x="40" y="60" width="18" height="100" fill="#100830"/>
  <rect x="43" y="45" width="10" height="18" fill="#100830"/>
  <rect x="56" y="75" width="22" height="85" fill="#0a0520"/>
  <rect x="75" y="55" width="20" height="105" fill="#0d0728"/>
  <rect x="78" y="40" width="14" height="18" fill="#0d0728"/>
  <rect x="93" y="65" width="27" height="95" fill="#100830"/>
  <rect x="97" y="50" width="16" height="18" fill="#100830"/>
  <!-- Windows lit up -->
  <rect x="21" y="68" width="3" height="2" fill="#ffe080" opacity=".8"/>
  <rect x="26" y="73" width="3" height="2" fill="#ffe080" opacity=".6"/>
  <rect x="26" y="80" width="3" height="2" fill="#80e0ff" opacity=".7"/>
  <rect x="32" y="68" width="3" height="2" fill="#ffe080" opacity=".9"/>
  <rect x="44" y="58" width="3" height="2" fill="#ffe080" opacity=".7"/>
  <rect x="44" y="66" width="3" height="2" fill="#80e0ff" opacity=".8"/>
  <rect x="50" y="62" width="3" height="2" fill="#ffe080" opacity=".5"/>
  <rect x="77" y="55" width="3" height="2" fill="#ffe080" opacity=".9"/>
  <rect x="82" y="62" width="3" height="2" fill="#80e0ff" opacity=".7"/>
  <rect x="82" y="70" width="3" height="2" fill="#ffe080" opacity=".6"/>
  <rect x="95" y="55" width="3" height="2" fill="#ffe080" opacity=".8"/>
  <rect x="102" y="65" width="3" height="2" fill="#80e0ff" opacity=".7"/>
  <!-- Neon sign -->
  <rect x="55" y="77" width="22" height="8" rx="2" fill="none" stroke="#e04070" stroke-width="1" opacity=".9"/>
  <text x="60" y="84" font-size="5" fill="#e04070" font-family="monospace" opacity=".9">CAFÉ</text>
  <!-- Street reflection -->
  <rect x="0" y="140" width="120" height="20" fill="#080018" opacity=".9"/>
  <line x1="0" y1="140" x2="120" y2="140" stroke="#2a1060" stroke-width="1"/>
  <!-- Rain streaks -->
  <line x1="20" y1="0" x2="15" y2="40" stroke="rgba(150,180,255,.15)" stroke-width="0.5"/>
  <line x1="45" y1="0" x2="40" y2="50" stroke="rgba(150,180,255,.15)" stroke-width="0.5"/>
  <line x1="70" y1="0" x2="65" y2="45" stroke="rgba(150,180,255,.15)" stroke-width="0.5"/>
  <line x1="95" y1="0" x2="90" y2="40" stroke="rgba(150,180,255,.15)" stroke-width="0.5"/>
  <!-- Moon -->
  <circle cx="90" cy="22" r="10" fill="#e8d0ff" opacity=".15"/>
  <circle cx="93" cy="19" r="9" fill="#080018"/>
</svg>
