<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="bgch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0505"/>
      <stop offset="50%" stop-color="#2a0808"/>
      <stop offset="100%" stop-color="#4a1010"/>
    </linearGradient>
  </defs>
  <rect width="120" height="160" fill="url(#bgch)"/>
  <!-- Moon -->
  <circle cx="85" cy="28" r="20" fill="#fff8e0" opacity=".15"/>
  <circle cx="85" cy="28" r="16" fill="#fff8e0" opacity=".12"/>
  <!-- Mountains ink wash -->
  <polygon points="0,100 30,50 55,80 70,45 90,75 110,35 120,70 120,160 0,160" fill="#200808" opacity=".9"/>
  <polygon points="0,120 20,75 40,90 60,60 80,85 100,55 120,80 120,160 0,160" fill="#1a0505" opacity=".95"/>
  <!-- Pine tree -->
  <line x1="25" y1="160" x2="25" y2="95" stroke="#2a0a0a" stroke-width="2"/>
  <polygon points="25,50 15,80 35,80" fill="#1a1a0a" opacity=".8"/>
  <polygon points="25,62 13,88 37,88" fill="#1a1a0a" opacity=".8"/>
  <polygon points="25,74 11,96 39,96" fill="#1a1a0a" opacity=".8"/>
  <!-- Traditional lantern -->
  <line x1="90" y1="0" x2="90" y2="12" stroke="#8b2000" stroke-width="1.5"/>
  <rect x="82" y="12" width="16" height="25" rx="8" fill="#cc2000" opacity=".9"/>
  <rect x="84" y="12" width="12" height="25" rx="6" fill="#ff4000" opacity=".7"/>
  <line x1="86" y1="37" x2="84" y2="45" stroke="#cc2000" stroke-width="1"/>
  <line x1="94" y1="37" x2="96" y2="45" stroke="#cc2000" stroke-width="1"/>
  <!-- Gold text/seal -->
  <circle cx="60" cy="80" r="12" fill="none" stroke="#d4a020" stroke-width="1" opacity=".6"/>
  <text x="54" y="85" font-size="12" fill="#d4a020" font-family="serif" opacity=".7">福</text>
  <!-- Cherry blossom -->
  <circle cx="60" cy="25" r="3" fill="#ff9090" opacity=".7"/>
  <circle cx="50" cy="30" r="3" fill="#ff9090" opacity=".6"/>
  <circle cx="70" cy="32" r="3" fill="#ffb0b0" opacity=".7"/>
  <circle cx="55" cy="18" r="2.5" fill="#ff9090" opacity=".5"/>
  <!-- Falling petals -->
  <ellipse cx="35" cy="55" rx="3" ry="2" fill="#ff9090" opacity=".5" transform="rotate(20 35 55)"/>
  <ellipse cx="95" cy="70" rx="3" ry="2" fill="#ff9090" opacity=".5" transform="rotate(-15 95 70)"/>
</svg>
