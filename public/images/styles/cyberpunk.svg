<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="bgcp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000010"/>
      <stop offset="100%" stop-color="#000830"/>
    </linearGradient>
  </defs>
  <rect width="120" height="160" fill="url(#bgcp)"/>
  <!-- Buildings -->
  <rect x="0" y="60" width="30" height="100" fill="#050518"/>
  <rect x="8" y="40" width="16" height="24" fill="#050518"/>
  <rect x="28" y="50" width="25" height="110" fill="#080828"/>
  <rect x="32" y="30" width="14" height="24" fill="#080828"/>
  <rect x="70" y="45" width="28" height="115" fill="#050518"/>
  <rect x="74" y="25" width="18" height="24" fill="#050518"/>
  <rect x="95" y="55" width="25" height="105" fill="#080828"/>
  <!-- Neon signs -->
  <rect x="10" y="55" width="18" height="6" rx="1" fill="#00ffff" opacity=".7"/>
  <rect x="35" y="42" width="12" height="4" rx="1" fill="#ff00aa" opacity=".8"/>
  <rect x="72" y="38" width="20" height="5" rx="1" fill="#00ffff" opacity=".6"/>
  <!-- Lit windows -->
  <rect x="10" y="65" width="4" height="3" fill="#4040ff" opacity=".8"/>
  <rect x="16" y="65" width="4" height="3" fill="#00ccff" opacity=".7"/>
  <rect x="10" y="75" width="4" height="3" fill="#00ccff" opacity=".9"/>
  <rect x="30" y="55" width="4" height="3" fill="#4040ff" opacity=".8"/>
  <rect x="36" y="55" width="4" height="3" fill="#ff00aa" opacity=".7"/>
  <rect x="74" y="50" width="5" height="3" fill="#00ccff" opacity=".8"/>
  <rect x="81" y="50" width="5" height="3" fill="#4040ff" opacity=".9"/>
  <rect x="74" y="60" width="5" height="3" fill="#ff00aa" opacity=".6"/>
  <!-- Flying car -->
  <ellipse cx="50" cy="75" rx="12" ry="4" fill="#1a1a3a"/>
  <ellipse cx="50" cy="74" rx="8" ry="3" fill="#2a2a5a"/>
  <line x1="38" y1="75" x2="30" y2="78" stroke="#00ffff" stroke-width="1" opacity=".7"/>
  <line x1="62" y1="75" x2="70" y2="78" stroke="#00ffff" stroke-width="1" opacity=".7"/>
  <!-- Hologram -->
  <polygon points="55,95 65,95 60,110" fill="none" stroke="#00ffff" stroke-width="0.8" opacity=".5"/>
  <line x1="55" y1="95" x2="65" y2="95" stroke="#00ffff" stroke-width="0.8" opacity=".5"/>
  <!-- Ground neon lines -->
  <line x1="0" y1="145" x2="120" y2="145" stroke="#00ffff" stroke-width="1" opacity=".4"/>
  <line x1="0" y1="150" x2="120" y2="150" stroke="#ff00aa" stroke-width="0.5" opacity=".3"/>
  <!-- Rain/scan lines -->
  <line x1="15" y1="0" x2="10" y2="50" stroke="rgba(0,200,255,.1)" stroke-width="0.5"/>
  <line x1="40" y1="0" x2="35" y2="60" stroke="rgba(0,200,255,.1)" stroke-width="0.5"/>
  <line x1="80" y1="0" x2="75" y2="50" stroke="rgba(0,200,255,.1)" stroke-width="0.5"/>
  <line x1="105" y1="0" x2="100" y2="55" stroke="rgba(0,200,255,.1)" stroke-width="0.5"/>
</svg>
