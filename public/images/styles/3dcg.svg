<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="bg3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040d28"/>
      <stop offset="60%" stop-color="#0a2050"/>
      <stop offset="100%" stop-color="#1a4080"/>
    </linearGradient>
    <linearGradient id="armor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0c8f0"/>
      <stop offset="50%" stop-color="#4080c0"/>
      <stop offset="100%" stop-color="#1040a0"/>
    </linearGradient>
  </defs>
  <rect width="120" height="160" fill="url(#bg3d)"/>
  <!-- Grid floor -->
  <line x1="0" y1="120" x2="60" y2="90" stroke="#1a60c0" stroke-width="0.5" opacity=".4"/>
  <line x1="30" y1="130" x2="60" y2="90" stroke="#1a60c0" stroke-width="0.5" opacity=".4"/>
  <line x1="60" y1="135" x2="60" y2="90" stroke="#1a60c0" stroke-width="0.5" opacity=".4"/>
  <line x1="90" y1="130" x2="60" y2="90" stroke="#1a60c0" stroke-width="0.5" opacity=".4"/>
  <line x1="120" y1="120" x2="60" y2="90" stroke="#1a60c0" stroke-width="0.5" opacity=".4"/>
  <line x1="0" y1="110" x2="120" y2="110" stroke="#1a60c0" stroke-width="0.5" opacity=".3"/>
  <line x1="0" y1="125" x2="120" y2="125" stroke="#1a60c0" stroke-width="0.5" opacity=".2"/>
  <!-- 3D Character -->
  <!-- Body armor -->
  <polygon points="60,40 75,55 75,100 60,110 45,100 45,55" fill="url(#armor)" opacity=".9"/>
  <!-- Head -->
  <ellipse cx="60" cy="32" rx="16" ry="18" fill="#b0d0f0"/>
  <!-- Helmet visor -->
  <ellipse cx="60" cy="32" rx="12" ry="8" fill="#00d0ff" opacity=".7"/>
  <ellipse cx="60" cy="32" rx="10" ry="6" fill="#0080c0" opacity=".8"/>
  <!-- Eyes glow -->
  <ellipse cx="54" cy="31" rx="4" ry="3" fill="#00ffff" opacity=".9"/>
  <ellipse cx="66" cy="31" rx="4" ry="3" fill="#00ffff" opacity=".9"/>
  <!-- Arms -->
  <rect x="28" y="58" width="18" height="35" rx="8" fill="#6090d0" transform="rotate(-10 37 75)"/>
  <rect x="74" y="58" width="18" height="35" rx="8" fill="#6090d0" transform="rotate(10 83 75)"/>
  <!-- Glowing details -->
  <line x1="45" y1="65" x2="75" y2="65" stroke="#00d4ff" stroke-width="1" opacity=".6"/>
  <line x1="45" y1="80" x2="75" y2="80" stroke="#00d4ff" stroke-width="1" opacity=".6"/>
  <!-- Energy particles -->
  <circle cx="35" cy="50" r="2" fill="#00d4ff" opacity=".7"/>
  <circle cx="85" cy="55" r="2" fill="#00d4ff" opacity=".7"/>
  <circle cx="20" cy="80" r="1.5" fill="#4080ff" opacity=".5"/>
  <circle cx="100" cy="75" r="1.5" fill="#4080ff" opacity=".5"/>
  <!-- Gold accent -->
  <line x1="50" y1="130" x2="70" y2="130" stroke="#c4a535" stroke-width="2" opacity=".8"/>
  <circle cx="60" cy="130" r="4" fill="#c4a535" opacity=".6"/>
</svg>
